name: CI/CD for Resume Builder

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

env:
  DOCKER_REGISTRY: docker.io
  # It is acceptable to keep the username global, but ensure DOCKERHUB_TOKEN is only used in the login step.
  DOCKER_IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }} 
  IMAGE_NAME_BACKEND: resume-builder-backend
  IMAGE_NAME_FRONTEND: resume-builder-frontend

jobs:
  setup:
    name: Setup Environment & Tags
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      env_tag: ${{ steps.vars.outputs.env_tag }}
      env_prev_tag: ${{ steps.vars.outputs.env_prev_tag }}
      deploy_env: ${{ steps.vars.outputs.deploy_env }}
      run_deploy: ${{ steps.vars.outputs.run_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set workflow variables
        id: vars
        run: |
          # Generate a unique tag for this specific commit
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9_.-]/-/g')
          IMAGE_TAG="${BRANCH_NAME}-${SHA_SHORT}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          # Determine deployment environment and stable tags
          DEPLOY_ENV="dev"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            DEPLOY_ENV="prod"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            DEPLOY_ENV="staging"
          fi
          echo "deploy_env=${DEPLOY_ENV}" >> $GITHUB_OUTPUT
          echo "env_tag=${DEPLOY_ENV}" >> $GITHUB_OUTPUT
          echo "env_prev_tag=${DEPLOY_ENV}-prev" >> $GITHUB_OUTPUT

          # Determine if deployment should run
          # Only run on direct pushes to main or develop, not on PRs
          RUN_DEPLOY="false"
          if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "develop") ]]; then
            RUN_DEPLOY="true"
          fi
          echo "run_deploy=${RUN_DEPLOY}" >> $GITHUB_OUTPUT

  build-and-test-backend:
    name: Build & Test Backend
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run dependency audit (Non-blocking)
        run: npm audit --audit-level=high || true

      - name: Build TypeScript
        run: npm run build

  build-and-test-frontend:
    name: Build & Test Frontend
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FrontEnd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run dependency audit (Non-blocking)
        run: pnpm audit --audit-level=high || true

      - name: Build Next.js app
        run: pnpm build

  build-and-push-docker:
    name: Build & Push Docker Images
    needs: [setup, build-and-test-backend, build-and-test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.setup.outputs.env_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./FrontEnd
          file: ./FrontEnd/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.setup.outputs.env_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-images:
    name: Scan Container Images
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.setup.outputs.image_tag }}'
          format: 'table'
          # Changed to 0 so vulnerabilities are reported but don't block deployment. Change to 1 for strict security.
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.setup.outputs.image_tag }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to ${{ needs.setup.outputs.deploy_env }}
    needs: [setup, build-and-push-docker, scan-images]
    if: needs.setup.outputs.run_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.setup.outputs.deploy_env }}
      url: ${{ secrets.DEPLOY_HOST_URL }}
    env:
      DOCKER_COMPOSE_DEPLOY_YML: |
        services:
          mongo:
            image: mongo:7
            container_name: resume-mongo
            restart: unless-stopped
            environment:
              MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
              MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
              MONGO_INITDB_DATABASE: resume-builder
            volumes:
              - mongo_data:/data/db
            networks:
              - app_net
            healthcheck:
              test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
              interval: 10s
              timeout: 5s
              retries: 10

          backend:
            image: ${BACKEND_IMAGE}:${BACKEND_TAG}
            pull_policy: always
            container_name: resume-backend
            restart: unless-stopped
            environment:
              NODE_ENV: production
              PORT: 5000
              API_VERSION: v1
              API_PREFIX: /api
              MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/resume-builder?authSource=admin
              CORS_ORIGIN: http://localhost
              JWT_SECRET: ${JWT_SECRET}
              JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
              OPENAI_API_KEY: ${OPENAI_API_KEY}
              URLBOX_API_KEY: ${URLBOX_API_KEY:-}
            depends_on:
              mongo:
                condition: service_healthy
            networks:
              - app_net
            healthcheck:
              test: ["CMD-SHELL", "node -e \"const req=require('http').get('http://localhost:5000/health', (res)=>{res.resume();process.exit(res.statusCode===200?0:1);});req.on('error',()=>process.exit(1));\" "]
              interval: 10s
              timeout: 5s
              retries: 10

          frontend:
            image: ${FRONTEND_IMAGE}:${FRONTEND_TAG}
            pull_policy: always
            container_name: resume-frontend
            restart: unless-stopped
            environment:
              NODE_ENV: production
              PORT: 3000
              HOSTNAME: 0.0.0.0
            depends_on:
              backend:
                condition: service_healthy
            networks:
              - app_net
            healthcheck:
              test: ["CMD-SHELL", "node -e \"const req=require('http').get('http://localhost:3000', (res)=>{res.resume();process.exit(res.statusCode>=500?1:0);});req.on('error',()=>process.exit(1));\" "]
              interval: 10s
              timeout: 5s
              retries: 10

          nginx:
            image: nginx:1.27-alpine
            container_name: resume-nginx
            restart: unless-stopped
            ports:
              - "80:80"
            volumes:
              - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            depends_on:
              - frontend
              - backend
            networks:
              - app_net
            healthcheck:
              test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok"]
              interval: 10s
              timeout: 5s
              retries: 10

        networks:
          app_net:
            driver: bridge

        volumes:
          mongo_data:
      NGINX_DEFAULT_CONF: |
        upstream backend {
            server backend:5000;
        }

        upstream frontend {
            server frontend:3000;
        }

        server {
            listen 80;

            location /healthz {
                access_log off;
                return 200 "ok";
            }

            location /api {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location / {
                proxy_pass http://frontend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            
            # Navigate to deploy directory
            DEPLOY_PATH="/opt/resume-builder"
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # Create/update .env file with deployment variables and runtime secrets
            touch .env
            upsert_env() { key="$1"; value="$2"; file=".env"; if grep -q "^${key}=" "$file"; then sed -i "s|^${key}=.*|${key}=${value}|" "$file"; else echo "${key}=${value}" >> "$file"; fi }
            
            upsert_env DOCKER_REGISTRY "${{ env.DOCKER_REGISTRY }}"
            upsert_env DOCKER_IMAGE_NAMESPACE "${{ env.DOCKER_IMAGE_NAMESPACE }}"
            upsert_env BACKEND_IMAGE "${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_BACKEND }}"
            upsert_env FRONTEND_IMAGE "${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME_FRONTEND }}"
            upsert_env BACKEND_TAG "${{ needs.setup.outputs.env_tag }}"
            upsert_env FRONTEND_TAG "${{ needs.setup.outputs.env_tag }}"
            upsert_env OPENAI_API_KEY "${{ secrets.OPENAI_API_KEY }}"
            upsert_env URLBOX_API_KEY "${{ secrets.URLBOX_API_KEY }}"

            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            fi

            # Copy compose and nginx files
            cat > docker-compose.deploy.yml <<'EOF'
            ${{ env.DOCKER_COMPOSE_DEPLOY_YML }}
            EOF
            
            mkdir -p nginx
            cat > nginx/default.conf <<'EOF'
            ${{ env.NGINX_DEFAULT_CONF }}
            EOF

            # Pull new images and restart services
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
