services:
  mongo:
    image: mongo:7
    container_name: resume-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: resume-builder
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}:${BACKEND_TAG}
    pull_policy: always
    container_name: resume-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: v1
      API_PREFIX: /api
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/resume-builder?authSource=admin
      CORS_ORIGIN: http://localhost
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const req=require('http').get('http://localhost:5000/health', (res)=>{res.resume();process.exit(res.statusCode===200?0:1);});req.on('error',()=>process.exit(1));\" "]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: ${FRONTEND_IMAGE}:${FRONTEND_TAG}
    pull_policy: always
    container_name: resume-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const req=require('http').get('http://localhost:3000', (res)=>{res.resume();process.exit(res.statusCode>=500?1:0);});req.on('error',()=>process.exit(1));\" "]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: resume-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  app_net:
    driver: bridge

volumes:
  mongo_data:
